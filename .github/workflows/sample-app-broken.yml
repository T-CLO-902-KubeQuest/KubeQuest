name: Sample App (BROKEN) - Manual demo image

# Manual trigger ONLY. Unlike sample-app-build.yml, this never runs on push, so
# the deliberately broken image is built solely when an operator asks for it and
# is published under one fixed, unmistakable tag: `broken`.
on:
  workflow_dispatch:
    inputs:
      base_tag:
        description: "Tag of the healthy sample-app image to base the broken image on"
        default: "latest"
        required: true

permissions:
  contents: read

env:
  REGISTRY: ghcr.io

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write # needed to push the image to GHCR
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: image
        run: |
          echo "name=$(echo '${{ github.repository }}/sample-app' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU (for arm64 emulation)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: "Build & push broken image (tag: broken)"
        uses: docker/build-push-action@v6
        with:
          context: ./sample-app
          file: ./sample-app/Dockerfile.broken
          platforms: linux/amd64,linux/arm64
          push: true
          build-args: |
            BASE_TAG=${{ inputs.base_tag }}
          tags: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}:broken
