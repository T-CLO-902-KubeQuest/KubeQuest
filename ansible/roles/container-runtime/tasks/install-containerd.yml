---
- name: Install containerd prerequisites
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
  loop:
    - lsb-release
    - ca-certificates
    - curl
    - gnupg
- name: Create directory for containerd keyrings
  ansible.builtin.file:
    state: directory
    name: /etc/apt/keyrings
    mode: '0755'
- name: Add Docker's official GPG key
  ansible.builtin.get_url:
    url: https://download.docker.com/linux/ubuntu/gpg
    dest: /etc/apt/keyrings/docker.asc
    mode: '0644'
- name: Add Docker's APT repository
  ansible.builtin.apt_repository:
    repo: "deb [arch=arm64 signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu {{ ansible_distribution_release }} stable"
    state: present
    filename: docker
- name: Install containerd
  ansible.builtin.apt:
    name: containerd.io
    state: present
    update_cache: yes