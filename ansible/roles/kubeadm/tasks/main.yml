---
- name: Assert the target host for Red Hat family OS
  ansible.builtin.assert:
    that:
      - ansible_os_family == 'RedHat'
    fail_msg: >-
      This role uses yum_repository and dnf, so it only supports Red Hat
      family distributions (detected: {{ ansible_os_family }}).

- name: Add the official Kubernetes RPM repository
  ansible.builtin.yum_repository:
    name: kubernetes
    description: "Kubernetes {{ kubernetes_version }} (pkgs.k8s.io)"
    baseurl: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/"
    enabled: true
    gpgcheck: true
    gpgkey: "https://pkgs.k8s.io/core:/stable:/v{{ kubernetes_version }}/rpm/repodata/repomd.xml.key"
    exclude:
      # Exclude kube packages from regular dnf updates to prevent
      # uncontrolled version drift. Packages are installed explicitly
      # with disable_excludes in the next task.
      - kubelet
      - kubeadm
      - kubectl
      - cri-tools
      - kubernetes-cni

- name: Install kubelet, kubeadm, kubectl at the pinned version
  ansible.builtin.dnf:
    name:
      - "kubelet-{{ kubernetes_package_version }}"
      - "kubeadm-{{ kubernetes_package_version }}"
      - "kubectl-{{ kubernetes_package_version }}"
    state: present
    disable_excludes: kubernetes

- name: Check whether this node has already joined a cluster
  ansible.builtin.stat:
    path: /etc/kubernetes/kubelet.conf
  register: kubelet_conf

- name: Enable the kubelet systemd unit
  ansible.builtin.systemd:
    name: kubelet
    enabled: true

- name: Stop kubelet while the node is not yet joined
  ansible.builtin.systemd:
    name: kubelet
    state: stopped
  when: not kubelet_conf.stat.exists
