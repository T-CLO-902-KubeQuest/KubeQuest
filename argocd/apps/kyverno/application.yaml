apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kyverno
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/T-CLO-902-KubeQuest/KubeQuest.git
    targetRevision: main
    path: k8s/kyverno
    directory:
      include: "kyverno.yaml"
  destination:
    server: https://kubernetes.default.svc
    namespace: kyverno
  # Kyverno CRDs render with no labels/annotations, but the Server-Side Apply
  # dry-run defaults metadata.annotations/labels to empty maps that the stored
  # object prunes — an unresolvable, cosmetic diff. Ignore those two fields.
  ignoreDifferences:
    - group: apiextensions.k8s.io
      kind: CustomResourceDefinition
      jsonPointers:
        - /metadata/annotations
        - /metadata/labels
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # CRDs exceed the 262144-byte client-side apply annotation limit.
      - ServerSideApply=true