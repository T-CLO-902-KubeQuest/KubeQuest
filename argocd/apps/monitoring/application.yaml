# kube-prometheus-stack (Prometheus Operator + Prometheus + node-exporter +
# kube-state-metrics), synced by the root app-of-apps.
#
# Wave 0: fournit les CRD ServiceMonitor/PodMonitor. Toute app qui déclare un
# ServiceMonitor doit donc être synchronisée APRÈS (wave >= 1), sinon Argo CD
# applique le CR avant que sa CRD existe.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/T-CLO-902-KubeQuest/KubeQuest.git
    targetRevision: main
    path: k8s/monitoring
    directory:
      # monitoring.yaml = stack rendue ; example-app.yaml = témoin instrumenté
      # (Deployment + Service + ServiceMonitor) pour le 2e critère d'acceptation.
      # loki.yaml/promtail.yaml = agrégation de logs (#15) ; grafana-ingress.yaml
      # = exposition Grafana (#14) ; loki-dashboard.yaml = dashboard logs custom.
      include: "{monitoring.yaml,example-app.yaml,loki.yaml,promtail.yaml,grafana-ingress.yaml,loki-dashboard.yaml}"
  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Les CRD du Prometheus Operator dépassent la limite d'annotation de
      # 262144 o du client-side apply (même piège que cert-manager / argocd).
      - ServerSideApply=true
