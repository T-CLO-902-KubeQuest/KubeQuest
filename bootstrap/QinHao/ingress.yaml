apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hello-world-ingress
spec:
  rules:
  - host: hello-world.local        # fake domain for local testing
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: hello-world-service   # your existing service
            port:
              number: 80
