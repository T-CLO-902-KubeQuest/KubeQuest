deploymentMode: SingleBinary

loki:
  auth_enabled: false

  # Configuration du stockage éphémère local (filesystem)
  storage:
    type: filesystem
    bucketNames:
      chunks: chunks

  commonConfig:
    replication_factor: 1
    path_prefix: /var/loki

  schemaConfig:
    configs:
      - from: "2024-01-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h

# Configuration de l'unique pod généré (SingleBinary)
singleBinary:
  replicas: 1
  persistence:
    enabled: false
  nodeSelector:
    workload: monitoring

backend:
  replicas: 0
read:
  replicas: 0
write:
  replicas: 0

# Rétention des logs fixée à 24 heures pour économiser l'espace disque des VMs AWS
limits_config:
  retention_period: 24h