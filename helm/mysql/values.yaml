architecture: "standalone"
auth:
  database: "laravel"
  username: "laravel"
  existingSecret: "mysql-credentials"
primary:
  persistence:
    enabled: true
    size: 5Gi
    storageClass: "local-path"
  resources:
    requests:
      memory: "256Mi"
      cpu: "250m"
    limits:
      memory: "512Mi"
      cpu: "500m"
image:
  repository: "bitnamilegacy/mysql"
networkPolicy:
  enabled: true
  allowExternal: false
  allowExternalEgress: false
  extraIngress:
    - ports:
        - port: 3306
      from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: sample-app
          podSelector:
            matchLabels:
              app.kubernetes.io/name: sample-app
