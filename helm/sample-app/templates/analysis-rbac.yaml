# RBAC for the AnalysisTemplate Job (templates/analysistemplate.yaml): it lists
# the canary pods to compute the readiness ratio. Scoped to this namespace only.
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "sample-app.fullname" . }}-analysis
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "sample-app.fullname" . }}-analysis
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "sample-app.fullname" . }}-analysis
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "sample-app.fullname" . }}-analysis
subjects:
  - kind: ServiceAccount
    name: {{ include "sample-app.fullname" . }}-analysis
    namespace: {{ .Release.Namespace }}
