apiVersion: v1
kind: Secret
metadata:
  name: {{ include "sample-app.fullname" . }}
  labels:
    {{- include "sample-app.labels" . | nindent 4 }}
type: Opaque
stringData:
  APP_KEY: {{ required "app.key is required" .Values.app.key | quote }}
  DB_PASSWORD: {{ required "db.password is required" .Values.db.password | quote }}
