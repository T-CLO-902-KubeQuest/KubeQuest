replicaCount: 2

image:
  # Path published by .github/workflows/sample-app-build.yml
  # (${{ github.repository }}/sample-app, lowercased by GHCR).
  repository: ghcr.io/t-clo-902-kubequest/kubequest/sample-app
  # Empty by default: the chart falls back to Chart.appVersion, which the CI
  # pipeline publishes as a semver tag. Override per-release with --set if needed.
  tag: ""
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: app.kubequest.epitech.beer
  path: /
  pathType: Prefix
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  tls:
    enabled: true
    # Defaults to "<fullname>-tls" when empty.
    secretName: ""

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Argo Rollouts canary strategy. The chart ships a Rollout (not a Deployment),
# so a new release is rolled out as a canary and promoted only if the analysis
# (pod-readiness ratio) passes; otherwise it is aborted and rolled back to the
# previous stable ReplicaSet. See templates/rollout.yaml + analysistemplate.yaml.
canary:
  steps:
    # 1 canary pod out of replicaCount (=2). The analysis runs in background
    # from step 0 and decides promotion vs rollback.
    - setWeight: 50
    - pause:
        duration: 30s
  analysis:
    # Step at which the background AnalysisRun starts (0 = as soon as the canary
    # ReplicaSet is created).
    startingStep: 0

# A canary that never becomes Ready (e.g. broken image / failing /up) leaves the
# Rollout Progressing; past this deadline Argo Rollouts marks it Degraded. Keep
# it greater than the sum of the canary pauses above.
progressDeadlineSeconds: 120

app:
  env: production
  debug: "false"
  # Sessions are stored in the database, not on the pod filesystem. With
  # replicaCount > 1 (and across pod restarts/rescheduling), file-based sessions
  # live on a single pod's disk and would not be shared, breaking logins behind
  # the Service load balancing. The `sessions` table is created by the migrate
  # initContainer.
  sessionDriver: database
  # APP_KEY must be provided at install time, never committed
  key: ""
  # Demo hook: when true, the /up health endpoint is forced to fail (see
  # AppServiceProvider DiagnosingHealth listener). Used to demonstrate the
  # automatic canary rollback without shipping a deliberately broken image.
  forceUnhealthy: false
  # When set, the chart skips creating its own Secret and the Deployment reads
  # APP_KEY and DB_PASSWORD from this pre-existing Secret instead. Used by the
  # GitOps install so no secret material ever lands in Git.
  existingSecret: ""

db:
  host: mysql
  port: 3306
  database: app_database
  username: app_user
  # password provided via --set db.password or external Secret
  password: ""

nodeSelector: {}

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sample-app
          topologyKey: kubernetes.io/hostname

tolerations: []
