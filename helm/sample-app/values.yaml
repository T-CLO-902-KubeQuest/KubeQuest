replicaCount: 2

image:
  repository: ghcr.io/t-clo-902-kubequest/sample-app
  tag: "latest"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: nginx
  host: app.kubequest.local
  path: /
  pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 500m
    memory: 512Mi

app:
  env: production
  debug: "false"
  # APP_KEY must be provided at install time, never committed
  key: ""

db:
  host: mysql
  port: 3306
  database: app_database
  username: app_user
  # password provided via --set db.password or external Secret
  password: ""

nodeSelector: {}

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchLabels:
              app.kubernetes.io/name: sample-app
          topologyKey: kubernetes.io/hostname

tolerations: []
