# Ingress exposing the Argo CD UI/API at argocd.kubequest.epitech.beer.
#
# argocd-server runs with --insecure (plain HTTP) so the Ingress terminates TLS
# once; otherwise the server's own TLS plus the Ingress TLS double up and cause
# redirect loops. See argocd/install/values.yaml (configs.params).
#
# Starts on the staging issuer to validate HTTP-01 end to end. Once a staging
# cert is issued, switch the cert-manager.io/cluster-issuer annotation to
# letsencrypt-prod and delete the staging secret to force a prod re-issue.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: argocd-server
  namespace: argocd
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-staging
    nginx.ingress.kubernetes.io/backend-protocol: HTTP
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - argocd.kubequest.epitech.beer
      secretName: argocd-server-tls
  rules:
    - host: argocd.kubequest.epitech.beer
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: argocd-server
                port:
                  number: 80
