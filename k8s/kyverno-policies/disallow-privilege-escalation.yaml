# Baseline security: allowPrivilegeEscalation must be explicitly false.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: disallow-privilege-escalation
spec:
  rules:
    - name: check-privilege-escalation
      match:
        any:
          - resources:
              kinds:
                - Pod
      # System/infra namespaces host vendored third-party workloads we do not
      # control (and cannot make fully compliant); Enforce there would block
      # them. Application namespaces stay enforced (fail-closed: any namespace
      # not listed here is blocked).
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - argocd
                - argo-rollouts
                - monitoring
                - cert-manager
                - ingress-nginx
                - dex
                - headlamp
                - oauth2-proxy
                - local-path-storage
      validate:
        failureAction: Enforce
        message: "allowPrivilegeEscalation must be set to false on every container."
        pattern:
          spec:
            =(initContainers):
              - name: "*"
                securityContext:
                  allowPrivilegeEscalation: "false"
            containers:
              - name: "*"
                securityContext:
                  allowPrivilegeEscalation: "false"
