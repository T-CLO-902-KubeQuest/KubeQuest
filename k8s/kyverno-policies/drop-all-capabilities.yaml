# Restricted security: every container must drop ALL Linux capabilities.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: drop-all-capabilities
spec:
  rules:
    - name: check-drop-all-capabilities
      match:
        any:
          - resources:
              kinds:
                - Pod
      # System/infra namespaces host vendored third-party workloads we do not
      # control (and cannot make fully compliant); Enforce there would block
      # them. Application namespaces stay enforced (fail-closed: any namespace
      # not listed here is blocked).
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - argocd
                - argo-rollouts
                - monitoring
                - cert-manager
                - ingress-nginx
                - dex
                - headlamp
                - oauth2-proxy
                - local-path-storage
      validate:
        failureAction: Enforce
        message: "Every container must drop ALL capabilities (securityContext.capabilities.drop: [ALL])."
        pattern:
          spec:
            containers:
              - name: "*"
                securityContext:
                  capabilities:
                    drop:
                      - ALL
