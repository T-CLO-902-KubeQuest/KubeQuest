# Restricted security: pods must declare they run as a non-root user.
apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  name: require-run-as-non-root
spec:
  rules:
    - name: check-run-as-non-root
      match:
        any:
          - resources:
              kinds:
                - Pod
      # System/infra namespaces host vendored third-party workloads we do not
      # control (and cannot make fully compliant); Enforce there would block
      # them. Application namespaces stay enforced (fail-closed: any namespace
      # not listed here is blocked).
      exclude:
        any:
          - resources:
              namespaces:
                - kube-system
                - kube-public
                - kube-node-lease
                - kyverno
                - argocd
                - argo-rollouts
                - monitoring
                - cert-manager
                - ingress-nginx
                - dex
                - headlamp
                - oauth2-proxy
                - local-path-storage
      validate:
        failureAction: Enforce
        message: "Pods must set spec.securityContext.runAsNonRoot to true."
        pattern:
          spec:
            securityContext:
              runAsNonRoot: "true"
