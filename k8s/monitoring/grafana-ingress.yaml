# Ingress exposing Grafana at grafana.kubequest.epitech.beer (issue #14).
#
# Grafana authenticates users itself via OIDC (generic_oauth -> Dex), so unlike
# the other tools it does NOT delegate to oauth2-proxy's nginx auth_request.
# The Dex client `grafana` and its redirectURI (.../login/generic_oauth) are
# already declared in helm/dex/values.yaml.
#
# Grafana serves plain HTTP on its Service (port 80), so no backend-protocol
# annotation is needed — HTTP is ingress-nginx's default. TLS is issued by the
# letsencrypt-prod ClusterIssuer (HTTP-01), like the rest of the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: grafana
  namespace: monitoring
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - grafana.kubequest.epitech.beer
      secretName: grafana-tls
  rules:
    - host: grafana.kubequest.epitech.beer
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: kube-prometheus-stack-grafana
                port:
                  number: 80
