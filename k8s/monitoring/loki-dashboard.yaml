# Dashboard Grafana « Cluster Logs (Loki) » pré-provisionné (issue #15).
#
# Le sidecar dashboards de Grafana (activé dans helm/monitoring/values.yaml)
# scanne le namespace monitoring pour les ConfigMaps portant le label
# grafana_dashboard: "1" et les charge automatiquement — aucun import manuel.
#
# Ce dashboard satisfait de façon démontrable « les logs d'un pod sont
# consultables depuis la visualisation » : un panel logs interroge Loki, filtré
# par une variable $namespace (les ~16 dashboards métriques du chart couvrent #14).
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-logs-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  loki-logs.json: |-
    {
      "annotations": { "list": [] },
      "editable": true,
      "graphTooltip": 0,
      "schemaVersion": 39,
      "tags": ["logs", "loki"],
      "title": "Cluster Logs (Loki)",
      "uid": "cluster-logs-loki",
      "time": { "from": "now-1h", "to": "now" },
      "templating": {
        "list": [
          {
            "name": "namespace",
            "label": "Namespace",
            "type": "query",
            "datasource": { "type": "loki", "uid": "loki" },
            "query": { "label": "namespace", "type": 1 },
            "refresh": 2,
            "includeAll": true,
            "multi": true,
            "current": { "text": "All", "value": "$__all" }
          }
        ]
      },
      "panels": [
        {
          "type": "logs",
          "title": "Logs — namespace: $namespace",
          "datasource": { "type": "loki", "uid": "loki" },
          "gridPos": { "h": 22, "w": 24, "x": 0, "y": 0 },
          "options": {
            "showTime": true,
            "wrapLogMessage": true,
            "enableLogDetails": true,
            "dedupStrategy": "none",
            "sortOrder": "Descending"
          },
          "targets": [
            {
              "datasource": { "type": "loki", "uid": "loki" },
              "expr": "{namespace=~\"$namespace\"}",
              "refId": "A"
            }
          ]
        }
      ]
    }
