---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-backups
  namespace: mysql
spec:
  accessModes: [ ReadWriteOnce ]
  resources:
    requests:
      storage: 1Gi
  storageClassName: local-path
---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup
  namespace: mysql
spec:
  schedule: "0 2 * * *" # Every day at 2 AM
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mysql-backup
              image: docker.io/bitnamilegacy/mysql:8.0.37-debian-12-r2
              env:
                # Least privilege: back up with the app user (scoped to the
                # laravel DB) instead of root. --no-tablespaces avoids the
                # global PROCESS privilege a non-root user lacks in MySQL 8.
                - name: MYSQL_PASSWORD
                  valueFrom:
                    secretKeyRef:
                      name: mysql-credentials
                      key: mysql-password
              command: ["/bin/sh", "-c"]
              args:
                # Write to a .tmp first and rename on success only, so a failed
                # dump never leaves a partial .sql picked up by the restore.
                - |
                  set -e
                  f=/backups/laravel-$(date +%F-%H%M%S).sql
                  mysqldump --single-transaction --no-tablespaces -h mysql -u laravel -p"$MYSQL_PASSWORD" laravel > "$f.tmp"
                  mv "$f.tmp" "$f"
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                runAsGroup: 1001
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: mysql-backups
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: mysql-backups
              persistentVolumeClaim:
                claimName: mysql-backups

---
apiVersion: batch/v1
kind: CronJob
metadata:
  name: mysql-backup-cleanup
  namespace: mysql
spec:
  schedule: "0 3 * * *" # Every day at 3 AM
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 300
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        spec:
          containers:
            - name: mysql-backup-cleanup
              image: docker.io/bitnamilegacy/mysql:8.0.37-debian-12-r2
              command: ["/bin/sh", "-c"]
              args:
                - find /backups -type f -name "*.sql" -mtime +7 -delete
              resources:
                requests:
                  cpu: 100m
                  memory: 128Mi
                limits:
                  cpu: 250m
                  memory: 256Mi
              securityContext:
                allowPrivilegeEscalation: false
                runAsNonRoot: true
                runAsUser: 1001
                runAsGroup: 1001
                capabilities:
                  drop:
                    - ALL
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: mysql-backups
                  mountPath: /backups
          restartPolicy: OnFailure
          volumes:
            - name: mysql-backups
              persistentVolumeClaim:
                claimName: mysql-backups
