# Ingress exposing the Vault UI at vault.kubequest.epitech.beer.
#
# Like Grafana — and unlike the tools that rely on oauth2-proxy's forward-auth
# — Vault authenticates users itself: its native OIDC auth method speaks to
# the cluster-wide Dex (staticClient `vault`, see helm/dex/values.yaml and
# adr/0007), so the login page is public and no auth_request annotations are
# needed here.
#
# Vault's listener has tls_disable = 1 (see helm/vault/values.yaml), so the
# Service serves plain HTTP — no backend-protocol annotation needed, HTTP is
# ingress-nginx's default. TLS is issued by the letsencrypt-prod ClusterIssuer
# (HTTP-01), like the rest of the cluster.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: vault
  namespace: vault
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - vault.kubequest.epitech.beer
      secretName: vault-tls
  rules:
    - host: vault.kubequest.epitech.beer
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: vault
                port:
                  number: 8200
